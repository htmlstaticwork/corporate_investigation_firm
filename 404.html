<!DOCTYPE html>

<html lang="en" dir="ltr" data-theme="dark">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Access Denied | Corporate Investigation Firm</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/theme.css">

    <link rel="stylesheet" href="assets/css/rtl.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        primary: 'rgb(var(--primary-rgb) / <alpha-value>)',

                        secondary: 'rgb(var(--secondary-rgb) / <alpha-value>)',

                        accent: 'rgb(var(--accent-rgb) / <alpha-value>)',

                        white: 'rgb(var(--text-main-rgb) / <alpha-value>)',

                    }

                }

            }

        }

    </script>





    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">
</head>

<body class="bg-primary text-white overflow-x-hidden">

    <!-- Error Selection -->

    <section class="min-h-screen flex items-center justify-center relative overflow-hidden grid-bg">

        <div class="absolute inset-0 bg-primary/20 pointer-events-none"></div>

        <div class="absolute top-0 left-0 w-full h-[1px] bg-red-500/20 animate-scan" style="animation-duration: 2s;"></div>

        

        <div class="container mx-auto px-4 md:px-8 text-center relative z-10">

            <div class="reveal-on-scroll">

                <div class="flex justify-center mb-8">

                    <i class="fas fa-hand text-red-500/80 text-6xl md:text-8xl animate-pulse"></i>

                </div>

                <!-- 404 Header requirement: Access Denied — This page does not exist -->

                <h1 class="text-6xl md:text-9xl font-bold mb-4 text-white">404</h1>

                <h2 class="text-2xl md:text-4xl font-bold mb-8 text-secondary">Access Denied &mdash; This page does not exist.</h2>

                <p class="text-secondary/60 text-sm md:text-lg max-w-lg mx-auto mb-10 font-mono border-l-2 border-red-500 pl-4 py-2 bg-red-500/5">

                    ERROR LOG: Request blocked by security parameters. The intelligence asset you are attempting to locate is missing, redacted, or restricted.

                </p>

                <div class="flex flex-col sm:flex-row justify-center gap-4">

                    <a href="index.html" class="btn-primary px-10 py-4 text-xs tracking-widest uppercase">Return to Operations Base</a>

                    <a href="contact.html" class="px-10 py-4 border border-white/20 text-white font-bold tracking-widest text-xs hover:bg-white/5 transition-all text-center uppercase">Report Incident</a>

                </div>

            </div>

        </div>

    </section>



    



    <script src="assets/js/main.js"></script>

</body>

</html>
