<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Clearance | Corporate Investigation Firm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(var(--primary-rgb) / <alpha-value>)',
                        secondary: 'rgb(var(--secondary-rgb) / <alpha-value>)',
                        accent: 'rgb(var(--accent-rgb) / <alpha-value>)',
                        white: 'rgb(var(--text-main-rgb) / <alpha-value>)',
                    }
                }
            }
        }
    </script>




    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">
</head>
<body class="bg-primary text-white min-h-screen box-border overflow-x-hidden flex items-center justify-center relative pt-24 pb-12 px-4 md:px-0">
    <div class="absolute inset-0 grid-bg opacity-30"></div>
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 right-0 h-full w-[1px] bg-accent/20 animate-scan"></div>
    </div>
    
    <!-- Top Right Controls -->
    <div class="absolute top-4 right-4 md:top-6 md:right-6 z-50 flex items-center gap-5">
        <button id="rtl-toggle" title="RTL" class="text-secondary hover:text-accent transition-colors"><i class="fas fa-language text-2xl"></i></button>
        <button id="theme-toggle" title="Theme" class="text-secondary hover:text-accent transition-colors"><i class="fas fa-moon text-xl"></i></button>
    </div>
    
    <div class="relative z-10 w-full max-w-md p-8 md:p-12 glass-card border-t-2 border-t-accent rounded shadow-2xl animate-grid-reveal">
        <div class="flex flex-col items-center mb-10 text-center">
            <a href="index.html" class="flex items-center gap-2 mb-8 hover:opacity-80 transition-opacity">
                <div class="w-10 h-10 bg-accent rounded flex items-center justify-center text-primary font-bold text-xl transform rotate-45 animate-secure-pulse shadow-[0_0_15px_rgba(198,168,91,0.3)]">
                    <span class="-rotate-45">C</span>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-lg font-bold tracking-widest text-secondary -mb-1">CORPORATE</span>
                    <span class="text-xs tracking-[0.3em] text-accent font-medium">INVESTIGATION</span>
                </div>
            </a>
            
            <h1 class="text-2xl font-bold tracking-widest uppercase mb-2 text-white">Clearance Request</h1>
            <p class="text-xs text-secondary/40 font-mono">Identity Verification Required</p>
        </div>

        <form>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold tracking-widest uppercase text-secondary/60 mb-2">Full Legal Name</label>
                    <div class="relative">
                        <i class="fas fa-user-tie absolute left-4 top-1/2 -translate-y-1/2 text-secondary/40"></i>
                        <input type="text" class="w-full bg-primary/50 border border-white/10 p-4 pl-12 font-sm text-white rounded input-accent transition-colors" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold tracking-widest uppercase text-secondary/60 mb-2">Corporate Entity</label>
                    <div class="relative">
                        <i class="fas fa-building absolute left-4 top-1/2 -translate-y-1/2 text-secondary/40"></i>
                        <input type="text" class="w-full bg-primary/50 border border-white/10 p-4 pl-12 font-sm text-white rounded input-accent transition-colors" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold tracking-widest uppercase text-secondary/60 mb-2">Corporate Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-secondary/40"></i>
                        <input type="email" class="w-full bg-primary/50 border border-white/10 p-4 pl-12 font-sm text-white rounded input-accent transition-colors" required>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <a href="login.html" class="w-full btn-primary py-4 text-xs tracking-widest block text-center mb-6">SUBMIT FOR REVIEW</a>
                
                <div class="relative flex items-center mb-6">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="px-4 text-xs text-secondary/40 font-bold uppercase tracking-widest">Or connect with</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>
                
                <div class="flex flex-col gap-3">
                    <button type="button" class="w-full bg-primary/40 border border-white/10 text-secondary font-bold py-3 rounded hover:border-red-500/40 hover:bg-red-500/10 transition-all flex items-center justify-center gap-3 text-xs tracking-widest uppercase">
                        <i class="fab fa-google text-red-500 text-lg"></i> Continue with Google
                    </button>
                    <button type="button" class="w-full bg-primary/40 border border-white/10 text-secondary font-bold py-3 rounded hover:border-[#1877F2]/40 hover:bg-[#1877F2]/10 transition-all flex items-center justify-center gap-3 text-xs tracking-widest uppercase">
                        <i class="fab fa-facebook text-[#1877F2] text-lg"></i> Continue with Facebook
                    </button>
                </div>
            </div>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <p class="text-xs text-secondary/40">Already possessed clearance? <a href="login.html" class="text-accent font-bold hover:underline">Authenticate</a></p>
        </div>
    </div>
    
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-center text-xs text-secondary/20 font-mono flex items-center gap-2 whitespace-nowrap">
        <i class="fas fa-file-contract text-accent/50"></i> PGP Handshake Ready
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
